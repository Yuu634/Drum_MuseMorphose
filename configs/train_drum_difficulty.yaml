data:
  data_dir: './drum_dataset_with_difficulty'
  vocab_path: './drum_vocab.pkl'
  difficulty_bounds_path: './difficulty_bounds.pkl'
  train_split: './pickles/train_split.pkl'
  val_split: './pickles/val_split.pkl'
  test_split: './pickles/test_split.pkl'
  enc_seqlen: 128
  dec_seqlen: 1280
  max_bars: 16
  batch_size: 8
  num_workers: 4

model:
  enc_n_layer: 4
  enc_n_head: 8
  enc_d_model: 512
  enc_d_ff: 2048
  dec_n_layer: 8
  dec_n_head: 8
  dec_d_model: 512
  dec_d_ff: 2048
  d_latent: 512
  d_embed: 512

  # 5つの難易度埋め込み（各32次元）
  d_s_tech_emb: 32
  d_s_indep_emb: 32
  d_s_hand_emb: 32
  d_s_foot_emb: 32
  d_s_move_emb: 32

  # 各難易度は8クラス (0~7)
  n_s_tech_cls: 8
  n_s_indep_cls: 8
  n_s_hand_cls: 8
  n_s_foot_cls: 8
  n_s_move_cls: 8

  # 難易度属性を使用
  use_difficulty: true

  # 条件付けモード
  cond_mode: 'in-attn'

  # 事前学習済みモデルのパス (オプション)
  pretrained_params_path: null
  pretrained_optim_path: null

training:
  device: 'cuda'
  max_epochs: 100
  max_lr: 0.0002
  min_lr: 0.00001
  lr_decay_steps: 100000
  lr_warmup_steps: 4000
  no_kl_steps: 5000
  kl_cycle_steps: 10000
  kl_max_beta: 0.2
  free_bit_lambda: 0.0
  constant_kl: false
  trained_steps: 0
  ckpt_dir: './ckpts_drum_difficulty'
  ckpt_interval: 1000
  log_interval: 100
  val_interval: 2000
  use_amp: true

generate:
  dec_seqlen: 12800
  max_bars: 16
  max_input_dec_seqlen: 1280
  nucleus_p: 0.9
  temperature: 1.2
  use_latent_sampling: true
  latent_sampling_var: 0.1
