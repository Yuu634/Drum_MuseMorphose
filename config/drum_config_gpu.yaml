# ドラム譜MuseMorphose学習設定ファイル（GPU最適化版）

# データ設定
data:
  data_dir: './drum_prepare'              # トークン化されたドラムデータのディレクトリ
  vocab_path: './drum_vocab.pkl'          # 語彙ファイルのパス
  tokenization_method: 'standard'         # 'standard' or 'cp_limb_v1'
  train_split: './drum_prepare/train_split.pkl'  # 訓練データ分割
  val_split: './drum_prepare/val_split.pkl'      # 検証データ分割
  enc_seqlen: 128                         # エンコーダー最大系列長
  dec_seqlen: 1280                        # デコーダー最大系列長
  max_bars: 16                            # 最大小節数
  batch_size: 8                           # バッチサイズ（GPUメモリに応じて調整）
  num_workers: 4                          # データローダーのワーカー数

# モデル設定
model:
  # エンコーダー
  enc_n_layer: 6                          # エンコーダーのレイヤー数
  enc_n_head: 8                           # エンコーダーのアテンションヘッド数
  enc_d_model: 512                        # エンコーダーのモデル次元
  enc_d_ff: 2048                          # エンコーダーのフィードフォワード次元

  # デコーダー
  dec_n_layer: 6                          # デコーダーのレイヤー数
  dec_n_head: 8                           # デコーダーのアテンションヘッド数
  dec_d_model: 512                        # デコーダーのモデル次元
  dec_d_ff: 2048                          # デコーダーのフィードフォワード次元

  # 潜在空間と埋め込み
  d_latent: 512                           # 潜在空間の次元
  d_embed: 512                            # トークン埋め込みの次元

  # 属性埋め込み（ドラム譜では使用しない）
  d_polyph_emb: 0                         # ポリフォニー埋め込み次元（0=無効）
  d_rfreq_emb: 0                          # リズム頻度埋め込み次元（0=無効）
  cond_mode: 'none'                       # 条件付けモード（'none', 'add', 'concat'）

  # CP方式（cp_limb_v1）で利用する損失重み
  cp_loss_weights:
    event_type: 1.0
    structural: 1.0
    cp_pos: 1.0
    cp_hand1: 1.0
    cp_hand2: 1.0
    cp_right_foot: 1.0
    cp_left_foot: 1.0

  d_cp_pos_emb: 64
  d_cp_limb_emb: 64

  # 事前学習済みモデル（オプション）
  pretrained_params_path: null            # 事前学習済みパラメータのパス
  pretrained_optim_path: null             # 事前学習済みオプティマイザのパス

# 学習設定
training:
  device: 'cuda'                          # デバイス ('cuda' or 'cpu')
  use_amp: true                           # Mixed Precision Training（メモリ節約と高速化）
  max_epochs: 100                         # 最大エポック数
  trained_steps: 0                        # 学習済みステップ数（再開用）

  # 学習率
  max_lr: 0.0002                          # 最大学習率
  min_lr: 0.00005                         # 最小学習率
  lr_warmup_steps: 4000                   # ウォームアップステップ数
  lr_decay_steps: 100000                  # 学習率減衰ステップ数

  # KLダイバージェンス
  constant_kl: false                      # 定数KLベータを使用するか
  kl_max_beta: 0.2                        # KLベータの最大値
  no_kl_steps: 1000                       # KLを無効にするステップ数
  kl_cycle_steps: 10000                   # KL周期的スケジューリングの周期
  free_bit_lambda: 0.0                    # Free bitラムダ値

  # チェックポイントとログ
  ckpt_dir: './checkpoints_drum_gpu'      # チェックポイントディレクトリ
  ckpt_interval: 5000                     # チェックポイント保存間隔
  log_interval: 100                       # ログ記録間隔
  val_interval: 2000                      # 検証実行間隔
